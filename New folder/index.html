<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMNRY Coffee Master</title>
    <style>
        :root {
            --coffee-dark: #3E2723;
            --coffee-medium: #5D4037;
            --coffee-light: #D7CCC8;
            --crema: #EFEBE9;
            --correct-green: #4CAF50;
            --wrong-red: #F44336;
            --accent: #FF9800;
            --blue-level: #2196F3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--coffee-light);
            color: var(--coffee-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--coffee-dark);
            margin-bottom: 5px;
            text-align: center;
        }
        
        .subtitle {
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--coffee-medium);
            font-style: italic;
            text-align: center;
        }

        /* Generic Panel Style */
        .panel {
            background-color: var(--crema);
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border: 4px solid var(--coffee-medium);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Menus */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .menu-btn {
            background-color: var(--coffee-medium);
            color: white;
            font-size: 1.1rem;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .menu-btn:hover { background-color: var(--coffee-dark); }
        .menu-btn:active { transform: scale(0.98); }
        
        .sub-text {
            display: block;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 5px;
            color: #ddd;
        }

        /* Badges */
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .badge-module { background-color: var(--accent); }
        .badge-level { background-color: var(--blue-level); }
        .badge-timer { background-color: var(--wrong-red); display: flex; align-items: center; gap: 5px;}
        .timer-warning { animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Game Area Specifics */
        .question-box {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: white;
            color: var(--coffee-dark);
            border: 2px solid var(--coffee-medium);
            padding: 12px 15px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--coffee-light);
        }

        .option-letter {
            background-color: var(--coffee-medium);
            color: white;
            font-weight: bold;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        /* Option States */
        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        
        .option-btn.correct {
            background-color: var(--correct-green);
            color: white;
            border-color: var(--correct-green);
        }
        .option-btn.correct .option-letter { background-color: white; color: var(--correct-green); }

        .option-btn.wrong {
            background-color: var(--wrong-red);
            color: white;
            border-color: var(--wrong-red);
        }
        .option-btn.wrong .option-letter { background-color: white; color: var(--wrong-red); }

        /* Bottom Game Controls */
        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 2px solid var(--coffee-light);
            padding-top: 15px;
        }

        .status-text {
            font-size: 1rem;
            font-weight: bold;
        }

        .action-btn {
            background-color: var(--coffee-dark);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .action-btn:hover { background-color: var(--coffee-medium); }

        .nav-btn {
            background-color: transparent;
            color: var(--coffee-dark);
            border: 2px solid var(--coffee-dark);
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn:hover { background-color: var(--coffee-light); }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>☕ Luminary Coffee Master</h1>
    <p class="subtitle" id="main-subtitle">Choose your challenge</p>

    <!-- Master Game Mode Selection Screen -->
    <div id="mode-screen" class="panel">
        <h2>Select Game Mode</h2>
        <div class="btn-grid">
            <button class="menu-btn" onclick="showModuleMenu()">
                <strong>Practice Mode 📚</strong>
                <span class="sub-text">10 Questions by Module & Level</span>
            </button>
            <button class="menu-btn" style="background-color: var(--accent);" onclick="startExamMode()">
                <strong>Exam Simulator ⏱️</strong>
                <span class="sub-text">60 Mixed Questions • Progressive Difficulty • 30 Min</span>
            </button>
        </div>
    </div>

    <!-- Module Selection Screen (Practice Mode) -->
    <div id="module-screen" class="panel hidden">
        <h2>Select a Module</h2>
        <div class="btn-grid">
            <button class="menu-btn" onclick="selectModule('barista')">Barista Skills</button>
            <button class="menu-btn" onclick="selectModule('brewing')">Brewing</button>
            <button class="menu-btn" onclick="selectModule('roasting')">Roasting</button>
            <button class="menu-btn" onclick="selectModule('green')">Green Coffee</button>
            <button class="menu-btn" onclick="selectModule('sensory')">Sensory Skills</button>
        </div>
        <button class="nav-btn" onclick="showModeMenu()">← Back to Modes</button>
    </div>

    <!-- Level Selection Screen (Practice Mode) -->
    <div id="level-screen" class="panel hidden">
        <h2 id="level-module-title">Module</h2>
        <p>Choose your difficulty level</p>
        <div class="btn-grid">
            <button class="menu-btn" onclick="startPracticeGame('foundation')">Foundation</button>
            <button class="menu-btn" onclick="startPracticeGame('intermediate')">Intermediate</button>
            <button class="menu-btn" onclick="startPracticeGame('professional')">Professional</button>
        </div>
        <button class="nav-btn" onclick="showModuleMenu()">← Back to Modules</button>
    </div>

    <!-- Game Area -->
    <div id="game-area" class="panel hidden">
        <div class="badge-container">
            <div class="badge badge-module" id="badge-module">Module</div>
            <div class="badge badge-level" id="badge-level">Level</div>
            <div class="badge badge-timer hidden" id="badge-timer">⏱️ <span id="timer-text">30:00</span></div>
        </div>
        
        <div class="question-box" id="question-text">
            <!-- Question appears here -->
        </div>

        <div class="options-grid">
            <button class="option-btn" id="btn-a" onclick="checkAnswer('a')">
                <div class="option-letter">A</div> <span id="text-a">Option A</span>
            </button>
            <button class="option-btn" id="btn-b" onclick="checkAnswer('b')">
                <div class="option-letter">B</div> <span id="text-b">Option B</span>
            </button>
            <button class="option-btn" id="btn-c" onclick="checkAnswer('c')">
                <div class="option-letter">C</div> <span id="text-c">Option C</span>
            </button>
            <button class="option-btn" id="btn-d" onclick="checkAnswer('d')">
                <div class="option-letter">D</div> <span id="text-d">Option D</span>
            </button>
        </div>

        <div class="game-footer">
            <div class="status-text" id="status">Q: 1/10 | Score: 0</div>
            <button class="action-btn hidden" id="next-btn" onclick="nextQuestion()">Next Question ➔</button>
        </div>

        <button class="nav-btn" style="width: 100%; margin-top: 25px; border-color: var(--wrong-red); color: var(--wrong-red);" onclick="showModeMenu()">Exit Quiz 🚪</button>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen" class="panel hidden">
        <h2 id="victory-title">Quiz Complete! 🎉</h2>
        <p id="victory-message">Your Final Score:</p>
        <p><strong id="final-score" style="font-size: 2.5rem;">0 / 0</strong></p>
        <div class="btn-grid" id="victory-controls">
            <!-- Buttons injected by JS based on mode -->
        </div>
    </div>

        // Utilities
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Navigation Functions
        function hideAllScreens() {
            Object.values(screens).forEach(screen => screen.classList.add('hidden'));
            clearInterval(timerInterval); // Always clear timer when navigating
            ui.badgeTimer.classList.remove('timer-warning');
        }

        function showModeMenu() {
            hideAllScreens();
            screens.mode.classList.remove('hidden');
        }

        function showModuleMenu() {
            hideAllScreens();
            screens.module.classList.remove('hidden');
        }

        function selectModule(moduleKey) {
            currentModuleKey = moduleKey;
            ui.levelModuleTitle.textContent = coffeeDatabase[moduleKey].title;
            hideAllScreens();
            screens.level.classList.remove('hidden');
        }

        function showLevelMenu() {
            hideAllScreens();
            screens.level.classList.remove('hidden');
        }

        // Timer Logic
        function updateTimerUI() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            ui.timerText.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeRemaining <= 300) { // Under 5 minutes
                ui.badgeTimer.classList.add('timer-warning');
            }
        }

        function startTimer() {
            timeRemaining = 1800; // Reset to 30 mins
            updateTimerUI();
            ui.badgeTimer.classList.remove('hidden');
            
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    showVictory(true); // true flags that time ran out
                }
            }, 1000);
        }

        // Mode 1: Practice Game Flow
        function startPracticeGame(levelKey) {
            isExamMode = false;
            currentLevelKey = levelKey;
            
            const pool = [...coffeeDatabase[currentModuleKey].levels[levelKey]];
            shuffleArray(pool);
            
            activeQuizLength = Math.min(10, pool.length);
            currentQuestions = pool.slice(0, activeQuizLength);
            
            currentQIndex = 0;
            score = 0;

            ui.badgeModule.textContent = coffeeDatabase[currentModuleKey].title;
            ui.badgeLevel.textContent = levelKey.charAt(0).toUpperCase() + levelKey.slice(1);
            ui.badgeTimer.classList.add('hidden'); // Hide timer for practice

            hideAllScreens();
            screens.game.classList.remove('hidden');
            loadQuestion();
        }

        // Mode 2: Exam Simulator Flow
        function startExamMode() {
            isExamMode = true;
            
            let foundation = [];
            let intermediate = [];
            let professional = [];
            
            // Gather all questions
            for (const mod in coffeeDatabase) {
                foundation.push(...coffeeDatabase[mod].levels.foundation);
                intermediate.push(...coffeeDatabase[mod].levels.intermediate);
                professional.push(...coffeeDatabase[mod].levels.professional);
            }
            
            // Shuffle them
            shuffleArray(foundation);
            shuffleArray(intermediate);
            shuffleArray(professional);
            
            // Take 20 from each to create the ramped 60 question exam
            currentQuestions = [
                ...foundation.slice(0, 20),
                ...intermediate.slice(0, 20),
                ...professional.slice(0, 20)
            ];
            
            activeQuizLength = currentQuestions.length; // Should be 60
            currentQIndex = 0;
            score = 0;

            ui.badgeModule.textContent = "SCA Exam Simulator";
            ui.badgeLevel.textContent = "Foundation Phase"; // Starts here

            hideAllScreens();
            screens.game.classList.remove('hidden');
            
            startTimer();
            loadQuestion();
        }

        function restartCurrentMode() {
            if (isExamMode) {
                startExamMode();
            } else {
                startPracticeGame(currentLevelKey);
            }
        }

        // Universal Gameplay Flow
        function loadQuestion() {
            answered = false;
            ui.nextBtn.classList.add('hidden');
            
            const qData = currentQuestions[currentQIndex];
            ui.questionText.textContent = qData.q;
            ui.status.textContent = `Q: ${currentQIndex + 1} / ${activeQuizLength} | Score: ${score}`;

            // If Exam mode, dynamically update the level badge based on progression
            if (isExamMode) {
                if (currentQIndex < 20) ui.badgeLevel.textContent = "Foundation Phase";
                else if (currentQIndex < 40) ui.badgeLevel.textContent = "Intermediate Phase";
                else ui.badgeLevel.textContent = "Professional Phase";
            }

            // Reset and populate buttons
            ['a', 'b', 'c', 'd'].forEach(key => {
                const btn = ui.options[key].btn;
                btn.className = 'option-btn'; 
                btn.disabled = false;
                ui.options[key].text.textContent = qData.options[key];
            });
        }

        function checkAnswer(selectedKey) {
            if (answered) return;
            answered = true;

            const qData = currentQuestions[currentQIndex];
            const correctKey = qData.answer;

            // Show correct/wrong
            ['a', 'b', 'c', 'd'].forEach(key => {
                const btn = ui.options[key].btn;
                btn.disabled = true;
                
                if (key === correctKey) {
                    btn.classList.add('correct');
                } else if (key === selectedKey && selectedKey !== correctKey) {
                    btn.classList.add('wrong');
                }
            });

            if (selectedKey === correctKey) {
                score++;
            }

            ui.status.textContent = `Q: ${currentQIndex + 1} / ${activeQuizLength} | Score: ${score}`;
            
            // Change button text if it's the last question
            if (currentQIndex === activeQuizLength - 1) {
                ui.nextBtn.textContent = "Finish Quiz ➔";
            } else {
                ui.nextBtn.textContent = "Next Question ➔";
            }
            
            ui.nextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex >= currentQuestions.length) {
                showVictory(false);
            } else {
                loadQuestion();
            }
        }

function showVictory(timeRanOut) {
            hideAllScreens();
            screens.victory.classList.remove('hidden');
            
            // Calculate percentage and letter grade
            const percentage = Math.round((score / activeQuizLength) * 100);
            let letterGrade = 'F ❌ (Fail)';
            if (percentage >= 90) letterGrade = 'A 🏆 (Pass)';
            else if (percentage >= 80) letterGrade = 'B 🥈 (Pass)';
            else if (percentage >= 70) letterGrade = 'C 🥉 (Pass)';
            else if (percentage >= 60) letterGrade = 'D ⚠️ (Fail)';
            
            // Format score display based on mode
            if (isExamMode) {
                // Injects the percentage and grade on a new line below the raw score
                ui.finalScore.innerHTML = `${score} / ${activeQuizLength}<br><span style="font-size: 1.5rem; color: var(--accent);">${percentage}% | Grade: ${letterGrade}</span>`;
            } else {
                // Keeps the simple display for standard practice mode
                ui.finalScore.textContent = `${score} / ${activeQuizLength}`;
            }
            
            if (timeRanOut) {
                ui.victoryTitle.textContent = "Time's Up! ⏰";
                ui.victoryMessage.textContent = "You ran out of time. Here is your final score:";
            } else {
                ui.victoryTitle.textContent = isExamMode ? "Exam Complete! 🎓" : "Quiz Complete! 🎉";
                
                // Show time taken for exam mode
                if (isExamMode) {
                    const timeTaken = 1800 - timeRemaining;
                    const mins = Math.floor(timeTaken / 60);
                    const secs = timeTaken % 60;
                    ui.victoryMessage.textContent = `Time taken: ${mins}m ${secs}s. Your Final Score:`;
                } else {
                    ui.victoryMessage.textContent = "Your Final Score:";
                }
            }

            // Build dynamic buttons based on mode
            ui.victoryControls.innerHTML = ''; // clear old buttons
            
            const replayBtn = document.createElement('button');
            replayBtn.className = 'menu-btn';
            replayBtn.textContent = 'Play Again (New Questions) 🔄';
            replayBtn.onclick = restartCurrentMode;
            ui.victoryControls.appendChild(replayBtn);

            if (!isExamMode) {
                const changeLevelBtn = document.createElement('button');
                changeLevelBtn.className = 'menu-btn';
                changeLevelBtn.textContent = 'Change Level 📊';
                changeLevelBtn.onclick = showLevelMenu;
                ui.victoryControls.appendChild(changeLevelBtn);
            }

            const homeBtn = document.createElement('button');
            homeBtn.className = 'nav-btn';
            homeBtn.textContent = 'Back to Main Menu 🏠';
            homeBtn.onclick = showModeMenu;
            ui.victoryControls.appendChild(homeBtn);
        }

    </script>
</body>
</html>
